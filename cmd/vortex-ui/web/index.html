<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vortex</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; background: var(--vx-surface-0, #1e1e1e); }

      /* Themed scrollbars (document-level) */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--vx-scrollbar-thumb, #42424280); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--vx-scrollbar-thumb-hover, #555555b3); }
      ::-webkit-scrollbar-corner { background: transparent; }
    </style>
  </head>
  <body>
    <vortex-app></vortex-app>
    <script type="module" src="/app.ts"></script>
  </body>
</html>
