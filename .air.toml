# air configuration for vortex dev mode
# https://github.com/air-verse/air

root = "."
tmp_dir = ".air"

[build]
  cmd = "go build -o .air/vortex.exe ./cmd/vortex"
  entrypoint = ".air/vortex.exe"
  # Arguments passed to the built binary
  args_bin = ["--dev", "--port", "7370", "--config", "mock/dev.yaml"]
  include_ext = ["go"]
  exclude_dir  = ["cmd/vortex-ui", ".air", "vendor"]
  exclude_file = []
  delay = 500
  kill_delay = "500ms"
  rerun = false
  log = ".air/build-errors.log"

[log]
  time = false
  main_only = false

[color]
  main     = "magenta"
  watcher  = "cyan"
  build    = "yellow"
  runner   = "green"

[misc]
  clean_on_exit = true
