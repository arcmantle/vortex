name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  # ── Build the frontend UI and upload as artifact ──────────────────────
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: cmd/vortex-ui/web/pnpm-lock.yaml

      - name: Install & build frontend
        working-directory: cmd/vortex-ui/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: cmd/vortex/web/dist/
          retention-days: 1

  # ── Build Go binary for each platform ─────────────────────────────────
  build:
    needs: build-ui
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: vortex-windows-amd64.exe
            window_binary: vortex-window-windows-amd64.exe
            setup_binary: vortex-setup-windows-amd64.exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            binary: vortex-windows-arm64.exe
            window_binary: vortex-window-windows-arm64.exe
            setup_binary: vortex-setup-windows-arm64.exe
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            binary: vortex-linux-amd64
            window_binary: vortex-window-linux-amd64
            setup_binary: vortex-setup-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: vortex-darwin-arm64
            window_binary: vortex-window-darwin-arm64
            setup_binary: vortex-setup-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: cmd/vortex/web/dist/

      # Linux: install webkit2gtk for CGO (webview dependency)
      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev

      # Windows arm64: install llvm-mingw so CGO can cross-compile to AArch64.
      # The windows-latest runner is x64; standard MinGW only targets x86/x64.
      - name: Install llvm-mingw (Windows/arm64 cross-compiler)
        if: matrix.goos == 'windows' && matrix.goarch == 'arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '20260324'
          $archive = "llvm-mingw-$version-ucrt-x86_64.zip"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$version/$archive"
          $installRoot = Join-Path $env:RUNNER_TEMP 'llvm-mingw'
          $archivePath = Join-Path $env:RUNNER_TEMP $archive

          Invoke-WebRequest -Uri $url -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $installRoot -Force

          $toolchainRoot = Join-Path $installRoot ([System.IO.Path]::GetFileNameWithoutExtension($archive))
          $binDir = Join-Path $toolchainRoot 'bin'

          "LLVM_MINGW_ROOT=$toolchainRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: bash
        env:
          CC: ${{ (matrix.goos == 'windows' && matrix.goarch == 'arm64') &&
            'aarch64-w64-mingw32-clang' || '' }}
          CXX: ${{ (matrix.goos == 'windows' && matrix.goarch == 'arm64') &&
            'aarch64-w64-mingw32-clang++' || '' }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::8}"
          go run build.go \
            -os "${{ matrix.goos }}" \
            -arch "${{ matrix.goarch }}" \
            -version "$TAG" \
            -commit "$COMMIT" \
            -output "${{ matrix.binary }}"

      # Smoke test only runs on amd64 — can't execute arm64 binaries on an x64 runner.
      - name: Smoke test embedded UI
        if: matrix.goarch == 'amd64'
        shell: bash
        run: |
          ./${{ matrix.binary }} run --headless --port 7370 --config mock/release-smoke.vortex > smoke.log 2>&1 &
          app_pid=$!
          success=0

          for _ in {1..30}; do
            if curl --silent --show-error --fail http://127.0.0.1:7370/ | grep -qi '<!doctype html>'; then
              success=1
              break
            fi
            sleep 1
          done

          ./${{ matrix.binary }} instance quit release-smoke || true
          wait "$app_pid" || true

          if [[ "$success" -ne 1 ]]; then
            cat smoke.log
            echo "smoke test failed: embedded UI root did not respond"
            exit 1
          fi

      # macOS: generate icons and create .app bundle + DMG
      - name: Create macOS DMG
        if: matrix.goos == 'darwin'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          brew install librsvg imagemagick
          go run scripts/generate-icons.go
          go run scripts/create-app-bundle.go \
            --version "$TAG" \
            --output ./dist \
            --setup "${{ matrix.setup_binary }}"
          go run scripts/create-dmg.go \
            --version "$TAG" \
            --app-dir ./dist/Vortex.app \
            --output "Vortex-${TAG}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ matrix.binary }}
            ${{ matrix.window_binary }}
            ${{ matrix.setup_binary }}
            Vortex-*.dmg
          retention-days: 1

  # ── Create GitHub Release with all binaries ───────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum vortex-* Vortex-*.dmg 2>/dev/null > vortex-checksums.txt || \
          sha256sum vortex-* > vortex-checksums.txt

      - name: List artifacts
        run: ls -lR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
