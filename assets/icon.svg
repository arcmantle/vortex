<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>

  <!--
    Each crescent = two overlapping circles of the SAME radius, offset horizontally.
    The path traces the outer arc of circle1 (the bulge) and the inner arc of
    circle2 (the bite), connecting at their intersection points.
    Then each crescent is rotated to fan out like a vortex.
  -->

  <!-- Crescent 1: R=210, offset=70 → intersections at (291,49) and (291,463) -->
  <path d="M 291 49
           A 210 210 0 1 0 291 463
           A 210 210 0 0 1 291 49 Z"
        fill="url(#g1)" transform="rotate(0,256,256)"/>

  <!-- Crescent 2: R=175, offset=60 → intersections at (286,84) and (286,428) -->
  <path d="M 286 84
           A 175 175 0 1 0 286 428
           A 175 175 0 0 1 286 84 Z"
        fill="url(#g2)" transform="rotate(55,256,256)"/>

  <!-- Crescent 3: R=142, offset=50 → intersections at (281,116) and (281,396) -->
  <path d="M 281 116
           A 142 142 0 1 0 281 396
           A 142 142 0 0 1 281 116 Z"
        fill="url(#g3)" transform="rotate(110,256,256)"/>

  <!-- Crescent 4: R=112, offset=42 → intersections at (277,146) and (277,366) -->
  <path d="M 277 146
           A 112 112 0 1 0 277 366
           A 112 112 0 0 1 277 146 Z"
        fill="url(#g4)" transform="rotate(165,256,256)"/>

  <!-- Crescent 5: R=82, offset=34 → intersections at (273,176) and (273,336) -->
  <path d="M 273 176
           A 82 82 0 1 0 273 336
           A 82 82 0 0 1 273 176 Z"
        fill="url(#g5)" transform="rotate(220,256,256)"/>

  <!-- Crescent 6: R=55, offset=26 → intersections at (269,203) and (269,309) -->
  <path d="M 269 203
           A 55 55 0 1 0 269 309
           A 55 55 0 0 1 269 203 Z"
        fill="url(#g6)" transform="rotate(275,256,256)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="249" fill="none" stroke="#0e7490" stroke-width="2" opacity="0.4"/>
</svg>
